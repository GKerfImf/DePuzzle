<!doctype html>
<html lang="en">
<head>
    <!-- Required meta tags -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

    <!-- Bootstrap CSS -->
    <!-- Optional JavaScript -->
    <!-- jQuery first, then Popper.js, then Bootstrap JS -->
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css" integrity="sha384-ggOyR0iXCbMQv3Xipma34MD+dH/1fQ784/j6cY/iJTQUOhcWr7x9JvoRxT2MZw1T" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/10.7.1/styles/github.min.css" />
    <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/npm/diff2html/bundles/css/diff2html.min.css"/>
    <link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.0.8/css/all.css">

    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/diff2html/bundles/js/diff2html-ui.min.js"></script>
    <script src="https://code.jquery.com/jquery-3.3.1.slim.min.js" integrity="sha384-q8i/X+965DzO0rT7abK41JStQIAqVgRVzpbzo5smXKp4YfRvH+8abtTE1Pi6jizo" crossorigin="anonymous"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.14.7/umd/popper.min.js" integrity="sha384-UO2eT0CpHqdSJQ6hJty5KVphtPhzWj9WO1clHTMGa3JDZwrnQq4sF86dIHNDz0W1" crossorigin="anonymous"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/js/bootstrap.min.js" integrity="sha384-JjSmVgyd0p3pXB1rRibZUAYoIIy6OrQ6VrjIEaFf/nJGzIxFDsf4x0xIM+B07jRM" crossorigin="anonymous"></script>
    
    <link rel="stylesheet" href="{{ url_for('static', filename= 'css/style.css') }}">
    <title>DePuzzle</title>
</head>

<body>
    <div class="container">
        <h1>Welcome to DePuzzle</h1>
        <hr>
        <div style="max-width: 800px; margin: auto"> 
            <div class="alert alert-primary" role="alert">
                <button type="button" id="btnRight" class="btn btn-link btn-sm" name="right" style="float: right" data-toggle="modal" data-target="#settingsModal">
                    <i class="fa fa-cog" aria-hidden="true"></i>
                </button>
                <h4 class="alert-heading">Translate this:</h4>
                <hr>
                <p class="mb-0" id="writingPrompt">Loading...</p>
                <div class="form-group" id="tokens"></div>
            </div>
            <form>
                <div id="answerForm"></div>
                    <div class="form-group align-items-center">
                    <textarea id="translationForm" name="content" placeholder="Your translation" class="form-control"></textarea>
                </div>
                <div class="btn-group">
                    <button type="button" id="btnReset" class="btn btn-danger btn-sm" name="next">Reset</button>
                    <button type="button" id="btnNext" class="btn btn-secondary btn-sm" name="next" onclick=location.reload()>Next</button>
                    <button type="button" id="btnCheck" class="btn btn-success btn-sm" name="check">Check</button>
                </div>
            </form> 
        </div>
    
        <div class="modal fade" id="settingsModal" tabindex="-1" role="dialog" aria-labelledby="settingsModalLabel" aria-hidden="true">
            <div class="modal-dialog" role="document">
            <div class="modal-content">
                <div class="modal-header">
                <h5 class="modal-title" id="settingsModalLabel">Settings</h5>
                <button type="button" class="close" data-dismiss="modal" aria-label="Close">
                    <span aria-hidden="true">&times;</span>
                </button>
                </div>
                <div class="modal-body">
                    <h5> Sentiment: </h5>
                    <div class="btn-group btn-group-toggle" data-toggle="buttons">
                        <label class="btn btn-secondary">
                          <input type="radio" name="sentiment" id="sentiment_lov" autocomplete="off"> 🥰
                        </label>
                        <label class="btn btn-secondary">
                          <input type="radio" name="sentiment" id="sentiment_sma" autocomplete="off"> 🤓 
                        </label>
                        <label class="btn btn-secondary active">
                            <input type="radio" name="sentiment" id="sentiment_nor" autocomplete="off" checked> 🙂 
                        </label>
                        <label class="btn btn-secondary">
                          <input type="radio" name="sentiment" id="sentiment_ann" autocomplete="off"> 🙄 
                        </label>
                        <label class="btn btn-secondary">
                          <input type="radio" name="sentiment" id="sentiment_ang" autocomplete="off"> 🤬
                        </label>
                    </div>
                    <h5> ㅤ </h5>
                    <h5> Language: </h5>
                    <div class="btn-group btn-group-toggle" data-toggle="buttons">
                        <label class="btn btn-secondary active">
                            <input type="radio" name="lang" id="lang_de" autocomplete="off" checked> De
                        </label>
                        <label class="btn btn-secondary">
                            <input type="radio" name="lang" id="lang_ru" autocomplete="off"> Ru
                        </label>
                        <label class="btn btn-secondary">
                            <input type="radio" name="lang" id="lang_fr" autocomplete="off"> Fr
                        </label>
                        <label class="btn btn-secondary">
                            <input type="radio" name="lang" id="lang_es" autocomplete="off"> Es
                        </label>
                        <label class="btn btn-secondary">
                            <input type="radio" name="lang" id="lang_it" autocomplete="off"> It
                        </label>
                    </div>
                    <hr>
                    <div class="custom-control custom-switch">
                        <input type="checkbox" class="custom-control-input" id="hardcore">
                        <label class="custom-control-label" for="hardcore">Hardcore mode</label>
                    </div>
                </div>
                <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-dismiss="modal">Close</button>
                <button type="button" class="btn btn-primary" data-dismiss="modal" onclick=location.reload()>Save changes</button>
                </div>
            </div>
            </div>
        </div>
    
        <script>
            // Save the state of the page in session storage
            function saveState() {
                // Get the current page state
                var pageState = {
                    sentiment_lov: document.getElementById("sentiment_lov").checked,
                    sentiment_sma: document.getElementById("sentiment_sma").checked,
                    sentiment_nor: document.getElementById("sentiment_nor").checked,
                    sentiment_ann: document.getElementById("sentiment_ann").checked,
                    sentiment_ang: document.getElementById("sentiment_ang").checked,
                    lang_de: document.getElementById("lang_de").checked,
                    lang_ru: document.getElementById("lang_ru").checked,
                    lang_fr: document.getElementById("lang_fr").checked,
                    lang_es: document.getElementById("lang_es").checked,
                    lang_it: document.getElementById("lang_it").checked,
                    hardcore: document.getElementById("hardcore").checked,
                };
                // Save the page state in session storage
                sessionStorage.setItem('pageState', JSON.stringify(pageState));
            }
    
            // Restore the state of the page from session storage
            async function restoreState() {
                // Get the page state from session storage
                var pageState = JSON.parse(sessionStorage.getItem('pageState'));
                if (!pageState) return;
    
                for (const [key, value] of Object.entries(pageState)) {
                    if (value) { 
                        document.getElementById(key).click();
                    }
                    document.getElementById(key).checked = value;
                }           
            }
    
            // Save the state of the page on each navigation event
            window.addEventListener('beforeunload', saveState);
        </script>
    
        <script>
            
            // Looks a bit cryptic, but, essentially, this function fakes the following input to [diff2html]
            //   diff --git a/answer b/answer
            //   index 0000001..fffffff
            //   --- a/answer
            //   +++ b/answer
            //   @@ -1 +1 @@
            //   - ${s1}
            //   + ${s2}
            function fakeDiff(s1, s2) { 
                return `diff --git a/answer b/answer\nindex 0000001..fffffff\n--- a/answer\n+++ b/answer\n@@ -1 +1 @@\n- ${s1}\n+ ${s2}`;
            }
    
            function renderDiff(elementId, s1, s2) { 
                var diffString = fakeDiff(s1,s2)
    
                var targetElement = document.getElementById(elementId);
                var configuration = {
                    drawFileList: false,
                    fileListToggle: false,
                    fileListStartVisible: false,
                    fileContentToggle: false,
                    matching: 'lines',
                    outputFormat: 'line-by-line',
                    synchronisedScroll: true,
                    highlight: false,
                    renderNothingWhenEmpty: false
                };
                var diff2htmlUi = new Diff2HtmlUI(targetElement, diffString, configuration);
                diff2htmlUi.draw();
                diff2htmlUi.highlightCode();
            }
        </script>
    
        <script>
            var data = null 
            async function loadData() {
                await restoreState();
    
                var standardRequest = { "lang" : "de", "sentiment" : "nor", "hardcore" : false }
    
                var pageState = JSON.parse(sessionStorage.getItem('pageState'));
                if (pageState) {
                    for (const [key, value] of Object.entries(pageState)) {
                        if (value) { 
                            if (key.startsWith("sentiment")) { 
                                standardRequest["sentiment"] = key.slice(10);
                            } else if (key.startsWith("lang")) { 
                                standardRequest["lang"] = key.slice(5);
                            } else { 
                                standardRequest["hardcore"] = value;
                            }
                        }
                    }
                };
    
                try {
                    const response = await fetch('/load', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(standardRequest)
                    });
    
                    const resp = await response.json();
                    data = resp;
    
                } catch (error) {
                    // Handle any errors that occurred in the try block
                }
            }
        
            loadData().then(() => {
    
                const writingForm = document.getElementById('translationForm');
                const writingPrompt = document.getElementById('writingPrompt');
                writingPrompt.innerText = data['sen'];
                const tokens = document.getElementById('tokens');
    
                function addAllTokens () { 
                    data['tra_tokens'].forEach(token => {
        
                        let badge = document.createElement('span');
                        badge.classList.add('badge');
                        badge.classList.add('badge-secondary');
                        badge.innerText = token
                        
                        tokens.appendChild(badge);
        
                        badge.addEventListener("click", () => {
                            badge.remove();
                            writingForm.value += `${badge.innerText} `;
                        });
                    });
                }
                function removeAllTokens() {
                    for(let i = 0; i < 10; i++) {
                        tokens.childNodes.forEach(token => {
                            token.remove();
                        });
                    }
                }
                addAllTokens() 
                
                document.getElementById('btnReset').addEventListener('click', () => { 
                    removeAllTokens();
                    addAllTokens();
                    writingForm.value = "";
                })
    
                document.getElementById('btnCheck').addEventListener('click', () => { 
                    renderDiff("answerForm", writingForm.value.replace('\n',' '), data['tra'])
                })
            });
        </script>
    </div>
</body>
</html>
